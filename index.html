<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      table {
        border-spacing: 6px;
        border: 2px solid black;
        background-color: rgb(250, 215, 243);
      }
      #cal {
        border: 2px solid black;
        background-color: rgb(255, 208, 127);
        color: rgb(8, 8, 8);
        height: 30px;
      }
      #res {
        border: 2px solid black;
        text-align: end;
        height: 30px;
      }
      td {
        border: 2px solid black;
        border-radius: 15%;
        background-color: rgb(231, 234, 234);
        text-align: center;
        height: 40px;
        width: 40px;
      }
      .btn:hover {
        background-color: black;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th colspan="4" id="cal">Calculator</th>
      </tr>
      <tr>
        <th colspan="4" id="res"></th>
      </tr>
      <tr>
        <td class="btn" onclick="cle()">AC</td>
        <td class="btn" onclick="del()">DEL</td>
        <td class="btn" onclick="operation('%')">%</td>
        <td class="btn" onclick="operation('÷')">÷</td>
      </tr>
      <tr>
        <td class="btn" onclick="appendNum('7')">7</td>
        <td class="btn" onclick="appendNum('8')">8</td>
        <td class="btn" onclick="appendNum('9')">9</td>
        <td class="btn" onclick="operation('×')">×</td>
      </tr>
      <tr>
        <td class="btn" onclick="appendNum('4')">4</td>
        <td class="btn" onclick="appendNum('5')">5</td>
        <td class="btn" onclick="appendNum('6')">6</td>
        <td class="btn" onclick="operation('-')">-</td>
      </tr>
      <tr>
        <td class="btn" onclick="appendNum('1')">1</td>
        <td class="btn" onclick="appendNum('2')">2</td>
        <td class="btn" onclick="appendNum('3')">3</td>
        <td class="btn" onclick="operation('+')">+</td>
      </tr>
      <tr>
        <td class="btn" onclick="appendNum('0')">0</td>
        <td class="btn" onclick="appendNum('00')">00</td>
        <td class="btn" onclick="appendDecimal()">.</td>
        <td class="btn" onclick="calculate()">=</td>
      </tr>
    </table>
    <script>
      let num = "0";
      let backupNum = "0";
      let operationSymbol = "";

      document.getElementById("res").textContent = num;

      function cle() {
        num = "0";
        backupNum = "0";
        operationSymbol = "";
        display();
      }

      function display() {
        console.log("num : ",num," backup : ",backupNum," operator : ",operationSymbol)
        if (num === NaN) {
          num = "0";
        }
        document.getElementById("res").textContent = num;
      }

      function del() {
        if (num.length > 1) {
          num = num.slice(0, -1);
        } else {
          num = "0";
        }
        display();
      }

      function operation(symbol) {
        if (operationSymbol !== "") {
          calculate();
        }
        operationSymbol = symbol;
        backupNum = num;
        num = "0";
        display();
      }

      function appendNum(n) {
        if (num === "0") {
          num = n;
        } else {
          num += n;
        }
        display();
      }

      function appendDecimal() {
        if (!num.includes(".")) {
          num = num + ".";
        }
        display();
      }

      function calculate() {
        let a = parseFloat(backupNum);
        let b = parseFloat(num);

        switch (operationSymbol) {
          case "+":
            num = (a + b).toString();
            break;
          case "-":
            num = (a - b).toString();
            break;
          case "×":
            num = (a * b).toString();
            break;
          case "÷":
            num = (b !== 0 ? a / b : 0).toString();
            break;
          case "%":
            num = (a % b).toString();
        }
        backupNum = num;
        operationSymbol="";
        display();
      }

      document.addEventListener("keydown", function (e) {
        const key = e.key;
        if (!isNaN(key)) {
          appendNum(key);
        }
        else if (key === "+") {
          operation("+");
        } else if (key === "-") {
          operation("-");
        } else if (key === "*") {
          operation("×");
        } else if (key === "/") {
          operation("÷");
        } else if (key === "%") {
          operation("%");
        }
        else if (key === ".") {
          appendDecimal();
        }
        else if (key === "Enter" || key === "=") {
          e.preventDefault(); // prevent form submit
          calculate();
        }
        else if (key === "Backspace") {
          del();
        }
        else if (key === "Escape") {
          cle();
        }
      });
    </script>
  </body>
</html>
